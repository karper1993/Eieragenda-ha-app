name: "Eieragenda"
description: "Eieragenda voor Home Assistant"
version: "1.0.6"
slug: "eieragenda"
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
init: false
stage: experimental
backup: cold
hassio_api: true
hassio_role: default
homeassistant_api: true

# Echte Home Assistant Ingress. Geen iframe en geen hass_ingress rewrite-regels nodig.
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: mdi:egg
panel_title: Eieragenda
panel_admin: false

# Geen externe poort publiceren; alleen via Home Assistant Ingress.
ports: {}

map:
  - type: share
    read_only: false

options:
  notification_entity: "input_text.eieragenda_notificatie"

schema:
  notification_entity: str

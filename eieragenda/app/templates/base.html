<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17120c">
  <title>Eieragenda</title>
  <link rel="stylesheet" href="{{ app_url('static', filename='style.css') }}">
</head>
<body class="{{ body_class|default('') }}" data-state-token="{{ state_token|default('') }}">
  <script>window.EIERAGENDA_BASE = {{ app_base|tojson }};</script>
  {% if request.args.get('error') %}
  <script>window.initialError = {{ request.args.get('error')|tojson }};</script>
  {% endif %}
  <main class="shell">
    {% block content %}{% endblock %}
  </main>
  <script src="{{ app_url('static', filename='app.js') }}"></script>
</body>
</html>

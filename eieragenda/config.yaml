name: "Eieragenda"
description: "Eieragenda voor Home Assistant"
version: "1.0.4"
slug: "eieragenda"
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
init: false
stage: experimental
backup: cold

# Echte Home Assistant Ingress. Geen iframe en geen hass_ingress rewrite-regels nodig.
